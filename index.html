<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Tasks</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header" id="appHeader">
    <div class="header-content">
      <div class="progress-info">
        <span class="progress-label-text" data-i18n="progressLabel">Прогресс дня</span>
        <span class="progress-stats" id="progressStats">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>
    <button class="lang-btn" id="langBtn">EN</button>
  </header>

  <!-- Контент вкладок -->
  <main class="main-content">

    <!-- Tasks -->
    <section class="tab-panel active" id="tab-tasks">
      <div class="list-container" id="taskList"></div>
      <div class="empty-state" id="emptyTasks" style="display:none">
        <div class="empty-icon">📋</div>
        <p class="empty-text" data-i18n="emptyTasks">Задач пока нет</p>
        <p class="empty-hint" data-i18n="emptyTasksHint">Нажми + чтобы добавить</p>
      </div>
    </section>

    <!-- Achievements -->
    <section class="tab-panel" id="tab-achievements">
      <div class="achievements-container" id="achievementList"></div>
      <div class="empty-state" id="emptyAchievements" style="display:none">
        <div class="empty-icon">🏆</div>
        <p class="empty-text" data-i18n="emptyAch">Пока нет достижений</p>
        <p class="empty-hint" data-i18n="emptyAchHint">Выполни задачи и они появятся здесь</p>
      </div>
    </section>

    <!-- Thoughts -->
    <section class="tab-panel" id="tab-thoughts">
      <div class="thoughts-list" id="thoughtsList"></div>
      <div class="empty-state" id="emptyThoughts" style="display:none">
        <div class="empty-icon">💭</div>
        <p class="empty-text" data-i18n="emptyThoughts">Нет записей</p>
        <p class="empty-hint" data-i18n="emptyThoughtsHint">Напиши свою первую мысль</p>
      </div>
      <div class="thoughts-input-bar" id="thoughtsInputBar">
        <textarea
          id="thoughtInput"
          class="thought-textarea"
          data-i18n-placeholder="thoughtPlaceholder"
          placeholder="Напиши мысль..."
          rows="1"
        ></textarea>
        <button class="thought-send-btn" id="thoughtSendBtn">↑</button>
      </div>
    </section>

  </main>

  <!-- Нижняя навигация -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="tasks">
      <span class="tab-icon">📋</span>
      <span class="tab-label" data-i18n="tabTasks">Задачи</span>
    </button>
    <button class="tab-btn" data-tab="achievements">
      <span class="tab-icon">🏆</span>
      <span class="tab-label" data-i18n="tabAch">Победы</span>
    </button>
    <button class="tab-btn" data-tab="thoughts">
      <span class="tab-icon">💭</span>
      <span class="tab-label" data-i18n="tabThoughts">Мысли</span>
    </button>
  </nav>

  <!-- FAB -->
  <button class="fab" id="fabBtn" aria-label="Add">
    <span class="fab-icon">+</span>
  </button>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Новая задача</h3>
      </div>
      <div class="modal-body">
        <input
          type="text"
          class="modal-input"
          id="modalInput"
          autocomplete="off"
          maxlength="100"
        >
        <div class="type-toggle" id="typeToggle">
          <button class="type-btn active" data-type="daily">
            <span>🔄</span> <span data-i18n="typeDaily">Ежедневная</span>
          </button>
          <button class="type-btn" data-type="onetime">
            <span>📌</span> <span data-i18n="typeOnetime">Разовая</span>
          </button>
        </div>
        <div class="days-picker" id="daysPicker">
          <span class="days-picker-label" data-i18n="activeDays">Активна в дни:</span>
          <div class="days-row" id="daysRow"></div>
        </div>
        <div class="deadline-row" id="deadlineRow">
          <span class="deadline-row-label" data-i18n="deadline">Дедлайн</span>
          <div class="deadline-picker">
            <input type="date" id="deadlineDate" class="deadline-input">
            <input type="time" id="deadlineTime" class="deadline-input">
            <button class="deadline-clear-btn" id="deadlineClear" type="button">✕</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn modal-btn-cancel" id="modalCancel" data-i18n="cancel">Отмена</button>
        <button class="modal-btn modal-btn-save" id="modalSave" data-i18n="save">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Context menu -->
  <div class="context-menu" id="contextMenu" style="display:none">
    <button class="context-item context-edit" id="ctxEdit">
      <span>✏️</span> <span data-i18n="ctxEdit">Редактировать</span>
    </button>
    <button class="context-item context-delete" id="ctxDelete">
      <span>🗑️</span> <span data-i18n="ctxDelete">Удалить</span>
    </button>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
